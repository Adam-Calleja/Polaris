# Final dissertation manifest.
#
# This version intentionally removes the dedicated stability-check stages and
# uses 3 repeated runs for every evaluation-grid stage.
#
# Important:
# - Update the frozen defaults block after Stage 0A, Stage 0B, Stage 0C, Stage 1,
#   and Stage 2 before you run the later test stages.
# - The defaults below are a concrete starting point, not a claim that those
#   selections have already won.

artifacts_root: "../artifacts/experiments/protocol_final_3runs"
base_config: "../config/config.gaudi.yaml"

# Reusable config fragments. These extra top-level keys are ignored by the
# automation loader but are useful through YAML anchors.
generator_candidates:
  llama33: &llama33_generator
    generator_llm:
      type: "openai_like"
      model_name: "meta-llama/Llama-3.3-70B-Instruct"
      api_base: "http://vllm:8080/v1"
      api_key: "${POLARIS_LLM_API_KEY}"
      request_timeout: 90
      max_retries: 1
      model_kwargs:
        max_tokens: 1024
        temperature: 0
        top_p: 1.0
        stop_list: ["\nUser:", "\n\nUser:"]
  qwen25_32b: &qwen25_32b_generator
    generator_llm:
      type: "openai_like"
      model_name: "Qwen/Qwen2.5-32B-Instruct"
      api_base: "http://vllm:8080/v1"
      api_key: "${POLARIS_LLM_API_KEY}"
      request_timeout: 90
      max_retries: 1
      model_kwargs:
        max_tokens: 1024
        temperature: 0
        top_p: 1.0
        stop_list: ["\nUser:", "\n\nUser:"]
  mixtral8x22b: &mixtral8x22b_generator
    generator_llm:
      type: "openai_like"
      model_name: "mistralai/Mixtral-8x22B-Instruct-v0.1"
      api_base: "http://vllm:8080/v1"
      api_key: "${POLARIS_LLM_API_KEY}"
      request_timeout: 90
      max_retries: 1
      model_kwargs:
        max_tokens: 1024
        temperature: 0
        top_p: 1.0
        stop_list: ["\nUser:", "\n\nUser:"]
  mistral_large_2407: &mistral_large_2407_generator
    generator_llm:
      type: "openai_like"
      model_name: "mistralai/Mistral-Large-Instruct-2407"
      api_base: "http://vllm:8080/v1"
      api_key: "${POLARIS_LLM_API_KEY}"
      request_timeout: 90
      max_retries: 1
      model_kwargs:
        max_tokens: 1024
        temperature: 0
        top_p: 1.0
        stop_list: ["\nUser:", "\n\nUser:"]

prompt_configs:
  generic_prompt: &generic_prompt_config
    prompts:
      - "pkg:polaris_rag.prompts:hpc_rag_assistant_v1.json"
      - "pkg:polaris_rag.prompts:hpc_rag_assistant_v3_ticket_refs.json"
      - "pkg:polaris_rag.prompts:hpc_ticket_summarizer_v1.json"
    prompt_name: "hpc_rag_assistant"
    mlflow:
      prompt_registry:
        enabled: false
  ticket_prompt: &ticket_prompt_config
    prompts:
      - "pkg:polaris_rag.prompts:hpc_rag_assistant_v1.json"
      - "pkg:polaris_rag.prompts:hpc_rag_assistant_v3_ticket_refs.json"
      - "pkg:polaris_rag.prompts:hpc_ticket_summarizer_v1.json"
    prompt_name: "hpc_rag_assistant_ticket_refs"
    mlflow:
