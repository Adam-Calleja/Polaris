ingest_specs:
  baseline_docs: &baseline_docs_ingest
    kind: "html"
    homepage: "https://docs.hpc.cam.ac.uk/hpc/index.html"
    ingest_internal_links: true
    source: "docs"
    qdrant_collection_name: "exp_docs_cs800_ov80"
    persist_dir: "../data/storage/exp_docs_cs800_ov80"
    chunking_strategy: "markdown_token"
    chunk_size_tokens: 800
    chunk_overlap_tokens: 80
  baseline_tickets: &baseline_tickets_ingest
    kind: "jira"
    source: "tickets"
    qdrant_collection_name: "exp_tickets_cs800_ov80"
    persist_dir: "../data/storage/exp_tickets_cs800_ov80"
    start_date: "2017-11-01"
    chunking_strategy: "jira_turns_token"
    chunk_size_tokens: 800
    chunk_overlap_tokens: 80
  external_docs: &external_docs_ingest
    kind: "external_docs"
    source_register_file: "../data/authority/source_register.external_v1.yaml"
    source: "external_docs"
    qdrant_collection_name: "exp_external_docs_selected"
    persist_dir: "../data/storage/exp_external_docs_selected"
    chunking_strategy: "markdown_token"
    chunk_size_tokens: 800
    chunk_overlap_tokens: 80

defaults:
  config_overrides:
    <<: [*mistral_large_2407_generator, *ticket_prompt_config]
    vector_stores: *selected_vector_store_collections
    storage_context:
      persist_dir: "/app/data/storage/exp_protocol_selected"
    ingestion:
      chunking:
        sources: *selected_chunking_sources
      jira:
        start_date: "2017-11-01"
    retriever:
      source_type: "vector"
      <<: *budget_5_8
      rerank:
        weights_path: "config/weights/validity_reranker.protocol.yaml"
    evaluation:
      generation:
        mode: "pipeline"
        workers: 4
      run:
        max_workers: 1
      adaptive_concurrency:
        enabled: false
      dataset:
        reuse_prepared: false
  run_options:
    metrics:
      - "factual_correctness"
      - "faithfulness"
      - "context_recall"
      - "context_precision_without_reference"
      - "answer_relevancy"
      - "context_entity_recall"
      - "semantic_similarity"
      - "noise_sensitivity"
    generation_mode: "pipeline"
    generation_workers: 16
    evaluation_policy: "official"
    no_progress: false

stages:
  split_dev_test:
    type: "split"
    dataset_file: "../data/test/ragas_one_hop_eval_dataset_final.jsonl"
    annotations_file: "../data/test/benchmark_annotations_final.csv"
    test_fraction: 0.30
    random_state: 42
    dev_output_file: "../data/test/ragas_one_hop_eval_dataset_final.dev.jsonl"
    test_output_file: "../data/test/ragas_one_hop_eval_dataset_final.test.jsonl"
    test_ids_output_file: "../data/test/ragas_one_hop_eval_dataset_final.test_ids.txt"
    split_report_output_file: "../data/test/ragas_one_hop_eval_dataset_final.split_report.json"

  stage0a_generator_selection:
    type: "evaluation_grid"
    dataset_path: "../data/test/ragas_one_hop_eval_dataset_final.dev.jsonl"
    annotations_file: "../data/test/benchmark_annotations_final.csv"
    repeats: 3
    config_overrides:
      vector_stores:
        docs:
          collection_name: "support_docs_stage0a"
        tickets:
          collection_name: "support_tickets_stage0a"
      storage_context:
        persist_dir: "/app/data/storage/support_tickets_stage0a"
      ingestion:
        chunking:
          sources:
            docs:
              strategy: "markdown_token"
              chunk_size_tokens: 800
              overlap_tokens: 80
            tickets:
              strategy: "jira_turns_token"
              chunk_size_tokens: 800
              overlap_tokens: 80
      retriever:
        source_type: "vector"
        <<: *budget_5_8
    run_options:
      metrics:
        - "factual_correctness"
        - "faithfulness"
    conditions:
      - name: "qwen25_32b_naive_combined"
        preset: "naive_combined"
        config_overrides:
          <<: *qwen25_32b_generator
      - name: "mixtral8x22b_naive_combined"
        preset: "naive_combined"
        config_overrides:
          <<: *mixtral8x22b_generator
      - name: "mistral_large_2407_naive_combined"
