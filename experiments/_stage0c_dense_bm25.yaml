extends: /app/config/config.gaudi.yaml
prompts:
- pkg:polaris_rag.prompts:hpc_rag_assistant_v1.json
- pkg:polaris_rag.prompts:hpc_rag_assistant_v3_ticket_refs.json
- pkg:polaris_rag.prompts:hpc_ticket_summarizer_v1.json
prompt_name: hpc_rag_assistant_ticket_refs
mlflow:
  prompt_registry:
    enabled: false
generator_llm:
  type: openai_chat
  model_name: meta-llama/Llama-3.3-70B-Instruct:novita
  api_base: https://router.huggingface.co/v1
  api_key: ${HF_TOKEN_TEST}
  request_timeout: 90
  max_retries: 1
  model_kwargs:
    max_tokens: 1024
    temperature: 0
    top_p: 1.0
    stop_list: []
vector_stores:
  docs:
    collection_name: exp_docs_cs400_ov0
  tickets:
    collection_name: exp_tickets_cs1000_ov80
  external_docs:
    collection_name: exp_external_docs_selected
storage_context:
  persist_dir: /app/data/storage/exp_protocol_selected_docs400_ov0_tickets1000_ov80
ingestion:
  chunking:
    sources:
      docs:
        strategy: markdown_token
        chunk_size_tokens: 400
        overlap_tokens: 0
      tickets:
        strategy: jira_turns_token
        chunk_size_tokens: 1000
        overlap_tokens: 80
      external_docs:
        strategy: markdown_token
        chunk_size_tokens: 800
        overlap_tokens: 80
  jira:
    start_date: '2017-11-01'
retriever:
  top_k: 5
  final_top_k: 8
  hybrid_profile:
    dense_top_k: 5
    bm25_top_k: 5
    top_k: 5
    fusion:
      type: rrf
      rrf_k: 60
      signal_weights:
        dense: 1.0
        bm25: 1.0
  sources:
  - name: docs
    top_k: 5
    weight: 1.0
    filters: {}
  - name: tickets
    top_k: 5
    weight: 1.0
    filters: {}
  source_type: dense_bm25_hybrid
  rerank:
    weights_path: config/weights/validity_reranker.protocol.yaml
sparse_encoder:
  enabled: false
evaluation:
  generation:
    mode: pipeline
    workers: 16
  run:
    max_workers: 28
  adaptive_concurrency:
    enabled: false
  dataset:
    reuse_prepared: false
  metrics:
    config:
      factual_correctness:
        atomicity: high
        coverage: high
embedder:
  api_base: http://embed:80/v1
