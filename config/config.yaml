generator_llm:
  type: "openai_like"
  model_name: "llama-cam"
  api_base: "https://llm.hpc.cam.ac.uk/v1"
  api_key: "${POLARIS_LLM_API_KEY}"
  request_timeout: 90
  max_retries: 1
  model_kwargs:
    max_tokens: 4000
    temperature: 0.8
    top_p: 0.9
    stop_list: ["\nUser:", "\n\nUser:"]

evaluator_llm:
  type: "OpenAILike"
  # model_name: "Qwen/Qwen2.5-14B-Instruct" 
  model_name: "mistralai/Devstral-2-123B-Instruct-2512"
  # api_base: "http://vllm:8080/v1"
  api_base: "https://llm.hpc.cam.ac.uk/v1"
  api_key: "${POLARIS_LLM_API_KEY}"
  model_kwargs:
    temperature: 0
    top_p: 1.0
    max_tokens: 4096

embedder:
  type: "OpenAILike"
  api_base: "${EMBED_API_BASE}"
  model_name: "Qwen/Qwen3-Embedding-8B"
  api_key: ""
  timeout: 600
  max_retries: 3
  embed_batch_size: 1
  num_workers: 1
  model_kwargs: {}

vector_stores:
  docs:
    type: "qdrant"
    host: "qdrant"
    port: 6333
    collection_name: "support_docs_qwen3_8b"
    token: null
  tickets:
    type: "qdrant"
    host: "qdrant"
    port: 6333
    collection_name: "support_tickets_qwen3_8b"
    token: null

doc_store:
  type: "simple"

storage_context:
  persist_dir: "data/storage/local"

retriever:
  # NOTE: "hybrid" (BM25 + vector) requires local documents to be loaded so BM25 can build an index.
  # If the corpus is empty, BM25 indexing will fail. Use vector-only retrieval by default.
  type: "multi_collection"
  source_type: "vector"
  top_k: 5
  score_threshold: 0.0
  filters: {}
  final_top_k: 8
  rerank:
    type: "rrf"
    rrf_k: 60
  sources:
    - name: "docs"
      top_k: 5
      weight: 1.0
      filters: {}
    - name: "tickets"
      top_k: 5
      weight: 1.0
      filters: {}

document_loader:
  conditions:
    - tag: "a"
      condition: "not element.parent.find_all(string=True, recursive=False)"
    - tag: "div"
      condition: "element.get('role', '').strip().lower() == 'navigation'"
    - tag: "div"
      condition: "'class' in element.attrs and element.attrs['class'] == ['toctree-wrapper', 'compound']"
    - tag: "li"
      condition: "element.find('a', class_='reference internal') and element.find('ul') and all(not li.get_text(strip=True) for li in element.find_all('li'))"
  tags: ["nav", "footer", "title"]
  link_classes: ['reference', 'internal']

jira_api_credentials:
  username: "ac2650@cam.ac.uk"
  password: "${JIRA_API_TOKEN}"

prompts:
  - "pkg:polaris_rag.prompts:hpc_rag_assistant_v3_ticket_refs.json"
  - "pkg:polaris_rag.prompts:hpc_ticket_summarizer_v1.json"

prompt_name: "hpc_rag_assistant_ticket_refs"

ingestion:
  jira:
    start_date: null
    end_date: null
    limit: null
    exclude_summaries: []
    exclude_keys_file: "/app/data/test/eval_ticket_keys.txt"
  debug:
    dump_processed_tickets: false
    dump_path: "data/debug/jira_processed_tickets.txt"

evaluation:
  output_dir: "data/eval_runs/latest"

  dataset:
    input_path: "data/test/ragas_one_hop_eval_dataset_v1.jsonl"
    prepared_path: "data/test/prepared_eval_dataset.json"
    reuse_prepared: false
    query_field: "query"
    reference_field: "expected_answer"
    id_field: "id"

  generation:
    mode: "api"  # "pipeline" (in-process) or "api" (/v1/query endpoint)
    policy: "official"  # "official" for scored runs, "diagnostic" for failed-row replay
    api_url: "http://rag-api:8000/v1/query"
    api_timeout: 120
    api_headers: {}
    deadlines:
      official:
        client_total_seconds: 120
        server_total_seconds: 110
        retrieval_cap_seconds: 10
        cleanup_reserve_seconds: 5
      diagnostic:
        client_total_seconds: 180
        server_total_seconds: 170
        retrieval_cap_seconds: 15
        cleanup_reserve_seconds: 5
    workers: 1
    retries:
      max_attempts: 1
      initial_backoff_seconds: 1.0
      max_backoff_seconds: 8.0
      jitter_seconds: 0.25
      retry_on_empty_response: true
    raise_exceptions: false
    llm_generate: {}

  metrics:
    auto_gate: true
    requested:
      - "context_recall"
      - "faithfulness"
      - "answer_relevancy"
      - "factual_correctness"

  validity:
    max_infra_failure_rate: 0.01

  run:
    timeout: 240
    max_retries: 0
    max_wait: 30
    max_workers: 1
    batch_size: 1
    log_tenacity: true
    seed: 42
    raise_exceptions: false

  adaptive_concurrency:
    enabled: false
    worker_candidates: [2, 4, 8, 12, 16]
    worker_cap: 16
    warmup_fraction: 0.15
    warmup_min_samples: 4
    warmup_max_samples: 16
    failure_threshold: 0.02

  cache:
    enabled: false
    dir: ".cache/ragas_eval"

mlflow:
  enabled: true
  tracking_uri: "${MLFLOW_TRACKING_URI}"
  experiment_name: "polaris-rag-evals"
  tags:
    project: "polaris-rag"
    owner: "ac2650"
  tracing:
    enabled: true
    destination_experiment: "polaris-rag-traces"
  prompt_registry:
    enabled: true
    name: "hpc_rag_assistant_ticket_refs"
    alias: "prod"
