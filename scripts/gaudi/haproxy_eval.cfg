global
    log stdout format raw local0
    maxconn 2048

defaults
    log global
    mode http
    option httplog
    option redispatch
    retries 3
    timeout connect 5s
    timeout client 10m
    timeout server 10m

frontend vllm_eval_frontend
    bind *:8080
    default_backend vllm_eval_backend

backend vllm_eval_backend
    balance leastconn
    option httpchk GET /v1/models
    http-check expect status 200
    server q1 qwen-eval-1:8080 check
    server q2 qwen-eval-2:8080 check
    server q3 qwen-eval-3:8080 check
    server q4 qwen-eval-4:8080 check
