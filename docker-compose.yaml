services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_backend:/mlflow/backend
      - ./mlflow_artifacts:/mlflow/artifacts

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      POLARIS_CONFIG: /app/config/config.yaml
      POLARIS_LLM_API_KEY: ${POLARIS_LLM_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      EMBED_API_BASE: http://embed:80/v1
      MLFLOW_TRACKING_URI: http://mlflow:5000
      POLARIS_FEEDBACK_LOG_PATH: /app/data/ui_feedback/feedback.jsonl
      POLARIS_UI_CORS_ALLOWED_ORIGINS: http://localhost:8500,http://127.0.0.1:8500,http://localhost:8501,http://127.0.0.1:8501
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./persist:/app/persist
      - ./mlflow_artifacts:/mlflow/artifacts
    depends_on:
      qdrant:
        condition: service_started
      embed:
        condition: service_healthy
      mlflow:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  embed:
    build:
      context: .
      dockerfile: Dockerfile.embed
    image: rag_project-embed
    restart: unless-stopped
    environment:
      MODEL_ID: Qwen/Qwen3-Embedding-0.6B
      TRUST_REMOTE_CODE: "1"
      NORMALIZE_EMBEDDINGS: "1"
      MAX_LENGTH: "512"
      TORCH_NUM_THREADS: "4"
      USE_MODEL_ENCODE: "0"
      EMBED_MAX_BATCH_SIZE: "8"
      DISABLE_MKLDNN: "1"
      TOKENIZERS_PARALLELISM: "false"
      HF_HOME: /hf_cache
      TRANSFORMERS_CACHE: /hf_cache
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-}
    volumes:
      - ./hf_cache:/hf_cache
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

  eval:
    build:
      context: .
      dockerfile: Dockerfile.eval
    environment:
      POLARIS_CONFIG: /app/config/config.yaml
      POLARIS_LLM_API_KEY: ${POLARIS_LLM_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMBED_API_BASE: http://embed:80/v1
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./mlflow_artifacts:/mlflow/artifacts
    depends_on:
      rag-api:
        condition: service_healthy
      mlflow:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      POLARIS_UI_API_BASE_URL: http://localhost:8000
      POLARIS_UI_API_ENDPOINT_PATH: /v1/query
      POLARIS_UI_API_TIMEOUT_S: 60
      POLARIS_DISPLAY_NAME: ${POLARIS_DISPLAY_NAME:-You}
    ports:
      - "8500:80"
    depends_on:
      rag-api:
        condition: service_started
