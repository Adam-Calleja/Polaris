services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_backend:/mlflow/backend
      - ./mlflow_artifacts:/mlflow/artifacts

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      POLARIS_CONFIG: /app/config/config.yaml
      POLARIS_LLM_API_KEY: ${POLARIS_LLM_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      EMBED_API_BASE: http://embed:80/v1
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./persist:/app/persist
      - ./mlflow_artifacts:/mlflow/artifacts
    depends_on:
      - qdrant
      - embed
      - mlflow

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  embed:
    build:
      context: .
      dockerfile: Dockerfile.embed
    image: rag_project-embed
    restart: unless-stopped
    environment:
      MODEL_ID: Qwen/Qwen3-Embedding-0.6B
      TRUST_REMOTE_CODE: "1"
      NORMALIZE_EMBEDDINGS: "1"
      MAX_LENGTH: "512"
      TORCH_NUM_THREADS: "4"
      USE_MODEL_ENCODE: "0"
      EMBED_MAX_BATCH_SIZE: "8"
      DISABLE_MKLDNN: "1"
      TOKENIZERS_PARALLELISM: "false"
      HF_HOME: /hf_cache
      TRANSFORMERS_CACHE: /hf_cache
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-}
    volumes:
      - ./hf_cache:/hf_cache
    ports:
      - "8081:80"

  eval:
    build:
      context: .
      dockerfile: Dockerfile.eval
    environment:
      POLARIS_CONFIG: /app/config/config.yaml
      POLARIS_LLM_API_KEY: ${POLARIS_LLM_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      EMBED_API_BASE: http://embed:80/v1
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./mlflow_artifacts:/mlflow/artifacts
    depends_on:
      - rag-api
      - embed
      - mlflow

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    environment:
      RAG_API_BASE: http://rag-api:8000
    ports:
      - "8501:8501"
    depends_on:
      - rag-api
